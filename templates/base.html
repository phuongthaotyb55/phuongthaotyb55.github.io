<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ name }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="nav">
    <div class="container">
      <a class="nav-name" href="/">{{ name }}</a>
      <nav class="nav-links">
        <a href="/#about">About</a>
        <a href="/#projects">Projects</a>
        <a href="/#contact">Contact</a>
        <a href="{{ github_url }}" target="_blank" rel="noopener noreferrer">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="container">
      &copy; {{ name }}. Built with Flask, deployed on GitHub Pages.
      &middot; <a href="{{ github_url }}" target="_blank" rel="noopener noreferrer">GitHub</a>
    </div>
  </footer>
</body>
</html>
